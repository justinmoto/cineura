name: Frontend Guardian

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-guardian:
    name: Frontend Guardian (min score 70)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Frontend Guardian
        id: scan
        run: |
          npx frontend-guardian@latest . --json > scan-result.json
          echo "score=$(node -e "console.log(JSON.parse(require('fs').readFileSync('scan-result.json','utf8')).score)")" >> $GITHUB_OUTPUT
          echo "warnings_count=$(node -e "const d=JSON.parse(require('fs').readFileSync('scan-result.json','utf8')); console.log(d.warningsCount ?? d.warnings?.length ?? 0)")" >> $GITHUB_OUTPUT
          echo "duplicates_count=$(node -e "const d=JSON.parse(require('fs').readFileSync('scan-result.json','utf8')); console.log(d.duplicatesCount ?? d.duplicates?.length ?? 0)")" >> $GITHUB_OUTPUT
        env:
          CI: true

      - name: Issues detected
        run: |
          node -e "
            const d = JSON.parse(require('fs').readFileSync('scan-result.json', 'utf8'));
            const w = d.warnings || [];
            const dup = d.duplicates || [];
            if (w.length) {
              console.log('--- Warnings ---');
              w.forEach(x => console.log((x.file || '') + (x.line != null ? ':' + x.line : '') + ' - ' + (x.message || '')));
            }
            if (dup.length) {
              console.log('--- Duplicate groups ---');
              dup.forEach((g, i) => console.log((i+1) + '. ' + (g.files || []).join(', ')));
            }
            if (!w.length && !dup.length) console.log('No issues.');
          "

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const d = JSON.parse(fs.readFileSync('scan-result.json', 'utf8'));
            const score = d.score || 0;
            const warnings = d.warnings || [];
            const duplicates = d.duplicates || [];
            const issuesLine = [warnings.length > 0 && (warnings.length + ' warning(s)'), duplicates.length > 0 && (duplicates.length + ' duplicate group(s)')].filter(Boolean).join(', ') || '0 issues';
            let body = '## Frontend Guardian\n\n**Score:** ' + score + '/100 (min 70)\n**Issues:** ' + issuesLine + '\n';
            if (warnings.length) {
              body += '\n' + warnings.map(w => '- ' + (w.message || '').replace(/\n/g, ' ')).join('\n') + '\n';
            }
            if (duplicates.length) {
              body += '\nDuplicate groups: ' + duplicates.length + '\n';
            }
            body += '\n' + (score < 70 ? '❌ Below threshold' : '✅ Passed');
            body += '\n\n---\nRun `npx frontend-guardian .` in your CLI to see which files need enhancement.';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail if below threshold
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          if [ -z "$SCORE" ] || [ "$SCORE" -lt 70 ]; then
            echo "Score $SCORE is below required 70. Failing."
            exit 1
          fi
